services:
  web:
    image: harunari/household-tasks-web:latest
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "127.0.0.1:${WEB_PORT:-3100}:3100"
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/task_definitions.db
      - PORT=3100
      - TZ=Asia/Tokyo
      - VIKUNJA_URL=http://vikunja:3456/api/v1
      - VIKUNJA_API_TOKEN=${VIKUNJA_API_TOKEN}
      - DEFAULT_PROJECT_ID=${DEFAULT_PROJECT_ID:-1}
    labels:
      - "com.centurylinklabs.watchtower.scope=household-tasks"
    restart: unless-stopped

  scheduler:
    image: harunari/household-tasks-scheduler:latest
    build:
      context: .
      dockerfile: packages/scheduler/Dockerfile
    volumes:
      - ./data:/data
    environment:
      - TZ=Asia/Tokyo
      - DB_PATH=/data/task_definitions.db
      - VIKUNJA_URL=http://vikunja:3456/api/v1
      - VIKUNJA_API_TOKEN=${VIKUNJA_API_TOKEN}
      - DEFAULT_PROJECT_ID=${DEFAULT_PROJECT_ID:-1}
    labels:
      - "com.centurylinklabs.watchtower.scope=household-tasks"
    restart: unless-stopped
    depends_on:
      - vikunja

  vikunja:
    image: vikunja/vikunja
    ports:
      - "127.0.0.1:${VIKUNJA_PORT:-3456}:3456"
    volumes:
      - ./vikunja-data/files:/app/vikunja/files
      - ./vikunja-data/db:/db
    environment:
      - VIKUNJA_SERVICE_TIMEZONE=Asia/Tokyo
      - VIKUNJA_SERVICE_PUBLICURL=http://localhost:${VIKUNJA_PORT:-3456}
      - VIKUNJA_CORS_ENABLE=false
    labels:
      - "com.centurylinklabs.watchtower.scope=household-tasks"
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=Asia/Tokyo
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=true
      - WATCHTOWER_SCOPE=household-tasks
    labels:
      - "com.centurylinklabs.watchtower.scope=household-tasks"
    restart: unless-stopped

